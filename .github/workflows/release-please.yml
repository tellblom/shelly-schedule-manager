name: Release Please

on:
  push:
    branches:
      - main

# Required permissions for GITHUB_TOKEN to create releases and pull requests.
#
# Additionally, "Allow GitHub Actions to create and approve pull requests" must
# be enabled in your repository under Settings > Actions > General.
# See: https://github.com/googleapis/release-please-action?tab=readme-ov-file#workflow-permissions
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    # Skip when running inside the template repository itself
    if: github.repository != 'jpawlowski/hacs.integration_blueprint'
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
