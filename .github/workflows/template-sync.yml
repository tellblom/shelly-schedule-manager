---
# Syncs updates from the upstream integration blueprint template into this
# repository by opening a pull request whenever new changes are available.
#
# Files listed in .templatesyncignore are never touched.
#
# This workflow is provided by the template itself. You can safely customize
# the schedule, add a PAT secret for workflow-file updates, or disable it.
#
# Keeping .github/workflows/template-sync.yml in .templatesyncignore (default)
# means the template cannot overwrite your customizations here.
#
# Source: https://github.com/AndreasAugustin/actions-template-sync

name: Sync from Blueprint Template

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  template-sync:
    # Skip when running inside the template repository itself
    if: github.repository != 'jpawlowski/hacs.integration_blueprint'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync from blueprint template
        uses: AndreasAugustin/actions-template-sync@v2
        with:
          source_repo_path: jpawlowski/hacs.integration_blueprint
          upstream_branch: main
          pr_labels: template-sync
          pr_title: "chore: sync updates from integration blueprint template"
          pr_commit_msg: "chore(template): sync blueprint updates :up:"
          is_pr_cleanup: true
